<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contagens</title>
    <link rel="stylesheet" href="style-contagens.css" />
  </head>
  <body>
    <header class="cnt-header">
      <a href="index.html" class="cnt-back" aria-label="Voltar">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </a>
      <div class="cnt-header-info">
        <span id="lote-nome-header" class="cnt-lote-nome">—</span>
        <span id="lote-contagens-header" class="cnt-lote-sub">0 contagens</span>
      </div>
      <div class="cnt-header-actions">
        <button
          id="ver-contagens-btn"
          class="cnt-icon-btn"
          aria-label="Ver contagens"
        >
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"
            />
            <rect x="9" y="3" width="6" height="4" rx="1" ry="1" />
            <line x1="9" y1="12" x2="15" y2="12" />
            <line x1="9" y1="16" x2="13" y2="16" />
          </svg>
        </button>
        <button
          id="fullscreen-btn"
          class="cnt-icon-btn"
          aria-label="Tela cheia"
        >
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 3 21 3 21 9" />
            <polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
        </button>
      </div>
    </header>

    <main class="cnt-main">
      <!-- Tipo de contagem -->
      <div class="cnt-radio-group">
        <label class="cnt-radio-label">
          <input type="radio" name="tipo-contagem" value="loja" checked />
          <span class="cnt-radio-pill">Loja</span>
        </label>
        <label class="cnt-radio-label">
          <input type="radio" name="tipo-contagem" value="deposito" />
          <span class="cnt-radio-pill">Depósito</span>
        </label>
      </div>

      <!-- Busca de produto -->
      <div class="cnt-card">
        <label for="codigo" class="cnt-label">Código ou nome do produto</label>
        <input
          type="text"
          id="codigo"
          class="cnt-input cnt-input--big"
          placeholder="Digite e pressione Enter"
          autocomplete="off"
          enterkeyhint="search"
        />
        <div id="resultado" class="cnt-resultado"></div>
      </div>

      <!-- Quantidade -->
      <div class="cnt-card">
        <div class="cnt-qty-row">
          <div class="cnt-field" style="flex: 1">
            <label for="quantidade" class="cnt-label">Quantidade</label>
            <input
              type="number"
              id="quantidade"
              class="cnt-input cnt-input--qty"
              step="any"
              placeholder="0"
              enterkeyhint="done"
            />
          </div>
          <div class="cnt-qtde1-wrap">
            <label for="qtde1" class="cnt-label">Qtde 1</label>
            <label class="cnt-toggle">
              <input type="checkbox" id="qtde1" />
              <span class="cnt-toggle-track"
                ><span class="cnt-toggle-thumb"></span
              ></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Último contado -->
      <div id="ultimo-contado"></div>

      <!-- Exportar -->
      <div class="cnt-export-wrap">
        <button id="exportar-contagens" class="cnt-export-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Exportar Contagens
        </button>
      </div>
    </main>

    <!-- Modal: produto fora do lote -->
    <div
      id="fora-lote-modal"
      class="fora-lote-overlay"
      style="display: none"
      aria-live="assertive"
    >
      <div class="fora-lote-box">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <div>
          <div class="fora-lote-title">Produto fora do lote</div>
          <div id="fora-lote-desc" class="fora-lote-sub"></div>
        </div>
      </div>
    </div>

    <!-- Modal: lista de contagens -->
    <div id="contagens-modal" class="modal-overlay" style="display: none">
      <div class="modal-box modal-box--large">
        <div class="modal-header">
          <h3>Contagens registradas</h3>
          <div style="display: flex; align-items: center; gap: 0.5rem">
            <span id="total-contagens-badge" class="badge badge--blue">0</span>
            <button
              id="contagens-modal-close"
              class="cnt-icon-btn"
              aria-label="Fechar"
            >
              <svg
                width="20"
                height="20"
                color="red"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
        </div>
        <div
          id="contagens-modal-lista"
          class="tab-content active"
          style="
            display: block;
            overflow-y: auto;
            max-height: 60vh;
            padding: 1rem;
          "
        ></div>
      </div>
    </div>

    <script src="contagens.js"></script>
    <script src="contagens-salvar.js"></script>
    <script src="contagens-exportar.js"></script>
  </body>
</html>
